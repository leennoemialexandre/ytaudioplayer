<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LOOPIFY — YouTube Audio Loop Player</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #131313; --surface2: #1c1c1c;
      --accent: #c8f55a; --accent2: #5af5c8; --text: #f0f0f0;
      --muted: #555; --border: #222;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; overflow-x: hidden;
    }
    .wrapper { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 24px; }
    .header { display: flex; align-items: baseline; gap: 12px; }
    .logo { font-size: 2.4rem; font-weight: 800; letter-spacing: -2px; color: var(--accent); line-height: 1; }
    .tagline { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
    .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .input-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
    .input-row { display: flex; gap: 10px; }
    input[type="text"] { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.78rem; outline: none; transition: border-color 0.2s; }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }
    .load-btn { background: var(--accent); color: #0a0a0a; border: none; border-radius: 10px; padding: 12px 20px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: transform 0.15s, background 0.2s; white-space: nowrap; }
    .load-btn:hover { background: #d4ff6a; transform: scale(1.03); }
    .load-btn:disabled { opacity: 0.7; cursor: wait; transform: none; }
    .error-msg { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: #ff6b6b; min-height: 1em; }
    .player-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: none; flex-direction: column; }
    .player-card.visible { display: flex; animation: fadeUp 0.4s ease forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .track-info { padding: 20px 20px 0; display: flex; flex-direction: column; gap: 4px; }
    .track-type { font-family: 'Space Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent2); }
    .track-title { font-size: 1.05rem; font-weight: 700; line-height: 1.3; color: var(--text); min-height: 1.4em; }
    .visualizer { display: flex; align-items: center; gap: 3px; padding: 20px 20px 4px; height: 52px; }
    .bar { flex: 1; background: var(--accent); border-radius: 2px; opacity: 0.2; transform-origin: bottom; }
    .visualizer.playing .bar { opacity: 1; animation: wave var(--dur,1s) ease-in-out infinite alternate; }
    @keyframes wave { from { transform: scaleY(0.1); } to { transform: scaleY(1); } }
    .bar:nth-child(1){--dur:.7s;animation-delay:.00s}.bar:nth-child(2){--dur:.5s;animation-delay:.10s}.bar:nth-child(3){--dur:.9s;animation-delay:.05s}.bar:nth-child(4){--dur:.6s;animation-delay:.20s}.bar:nth-child(5){--dur:.8s;animation-delay:.15s}.bar:nth-child(6){--dur:.55s;animation-delay:.30s}.bar:nth-child(7){--dur:.75s;animation-delay:.08s}.bar:nth-child(8){--dur:.65s;animation-delay:.25s}.bar:nth-child(9){--dur:.85s;animation-delay:.12s}.bar:nth-child(10){--dur:.6s;animation-delay:.18s}.bar:nth-child(11){--dur:.95s;animation-delay:.04s}.bar:nth-child(12){--dur:.7s;animation-delay:.22s}.bar:nth-child(13){--dur:.5s;animation-delay:.33s}.bar:nth-child(14){--dur:.8s;animation-delay:.07s}.bar:nth-child(15){--dur:.65s;animation-delay:.28s}.bar:nth-child(16){--dur:.9s;animation-delay:.16s}.bar:nth-child(17){--dur:.55s;animation-delay:.35s}.bar:nth-child(18){--dur:.75s;animation-delay:.02s}.bar:nth-child(19){--dur:.85s;animation-delay:.24s}.bar:nth-child(20){--dur:.6s;animation-delay:.11s}
    .scrub-row { display: flex; align-items: center; gap: 10px; padding: 16px 20px 4px; }
    .time-label { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); white-space: nowrap; min-width: 34px; }
    .time-label.right { text-align: right; }
    .scrub-track { position: relative; flex: 1; height: 4px; background: var(--surface2); border-radius: 4px; cursor: pointer; }
    .scrub-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); border-radius: 4px; width: 0%; pointer-events: none; }
    .scrub-thumb { position: absolute; top: 50%; left: 0%; width: 13px; height: 13px; background: var(--accent); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0; transition: opacity 0.15s; }
    .scrub-track:hover .scrub-thumb { opacity: 1; }
    .controls { display: flex; align-items: center; gap: 12px; padding: 14px 20px; }
    .ctrl-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s, transform 0.15s; color: var(--text); font-size: 1.1rem; }
    .ctrl-btn:hover { background: #2a2a2a; transform: scale(1.07); }
    .ctrl-btn.primary { background: var(--accent); color: #0a0a0a; width: 56px; height: 56px; font-size: 1.3rem; border: none; }
    .ctrl-btn.primary:hover { background: #d4ff6a; }
    .loop-badge { margin-left: auto; font-family: 'Space Mono', monospace; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; color: var(--muted); }
    .loop-badge.on { border-color: var(--accent2); color: var(--accent2); background: rgba(90,245,200,0.07); }
    .vol-row { display: flex; align-items: center; gap: 10px; padding: 0 20px 20px; }
    .vol-icon { font-size: 0.9rem; color: var(--muted); width: 20px; text-align: center; }
    input[type="range"] { -webkit-appearance: none; flex: 1; height: 3px; background: var(--surface2); border-radius: 3px; outline: none; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .status { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); text-align: center; padding: 0 20px 16px; min-height: 1.4em; }
    .playlist-list { border-top: 1px solid var(--border); max-height: 240px; overflow-y: auto; display: none; }
    .playlist-list.visible { display: block; }
    .playlist-list::-webkit-scrollbar { width: 4px; }
    .playlist-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .pl-item { display: flex; align-items: center; gap: 12px; padding: 10px 20px; cursor: pointer; transition: background 0.15s; border-bottom: 1px solid var(--border); min-height: 40px; }
    .pl-item:last-child { border-bottom: none; }
    .pl-item:hover { background: var(--surface2); }
    .pl-item.active { background: rgba(200,245,90,0.06); }
    .pl-num { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); width: 26px; flex-shrink: 0; }
    .pl-item.active .pl-num { color: var(--accent); }
    .pl-title { font-size: 0.78rem; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pl-item.active .pl-title { color: var(--accent); }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="logo">LOOPIFY</div>
    <div class="tagline">YouTube → Audio Loop</div>
  </div>
  <div class="input-card">
    <div class="input-label">Paste a YouTube video or playlist URL</div>
    <div class="input-row">
      <input type="text" id="url-input" placeholder="https://youtube.com/watch?v=..." />
      <button class="load-btn" id="load-btn" onclick="loadURL()">Load</button>
    </div>
    <div class="error-msg" id="error-msg"></div>
  </div>
  <div class="player-card" id="player-card">
    <div class="track-info">
      <div class="track-type" id="track-type">VIDEO</div>
      <div class="track-title" id="track-title">—</div>
    </div>
    <div class="visualizer" id="visualizer">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="scrub-row">
      <span class="time-label" id="time-current">0:00</span>
      <div class="scrub-track" id="scrub-track">
        <div class="scrub-fill" id="scrub-fill"></div>
        <div class="scrub-thumb" id="scrub-thumb"></div>
      </div>
      <span class="time-label right" id="time-duration">0:00</span>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="prevTrack()" title="Previous">&#9664;&#9664;</button>
      <button class="ctrl-btn primary" id="play-btn" onclick="togglePlay()">&#9654;</button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Next">&#9654;&#9654;</button>
      <div class="loop-badge on" id="loop-badge" onclick="toggleLoop()">&#8635; Loop</div>
    </div>
    <div class="vol-row">
      <div class="vol-icon">&#128264;</div>
      <input type="range" id="vol-slider" min="0" max="100" value="80" oninput="setVolume(this.value)"/>
      <div class="vol-icon">&#128266;</div>
    </div>
    <div class="status" id="status-msg"></div>
    <div class="playlist-list" id="playlist-list"></div>
  </div>
</div>

<div style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;">
  <div id="yt-player"></div>
</div>

<script>
  var player = null;
  var playerReady = false;
  var isPlaylist = false;
  var loopOn = true;
  var currentIndex = 0;
  var videoIds = [];
  var titleCache = {};
  var scrubTimer = null;
  var isScrubbing = false;
  var loadToken = 0;
  var titleQueue = [];
  var activeTitleFetches = 0;
  var extractingPlaylist = false;
  var PLAYLIST_POLL_ID = null;
  var VISIBLE_RADIUS = 30;
  var TITLE_FETCH_CONCURRENCY = 3;

  var playlistListEl = document.getElementById('playlist-list');
  var loadBtnEl = document.getElementById('load-btn');
  var scrubTrack = document.getElementById('scrub-track');

  (function bootstrapYT() {
    var s = document.createElement('script');
    s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
  })();

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
      width: '1',
      height: '1',
      playerVars: {
        autoplay: 0,
        controls: 0,
        playsinline: 1,
        rel: 0,
        modestbranding: 1
      },
      events: {
        onReady: function(e) {
          playerReady = true;
          e.target.setVolume(80);
          setStatus('Ready.');
        },
        onStateChange: onStateChange,
        onError: onPlayerError
      }
    });
  }

  function onStateChange(e) {
    if (!window.YT) return;
    var S = YT.PlayerState;

    if (extractingPlaylist) return;

    if (e.data === S.PLAYING) {
      setPlaying(true);
      startScrubUpdater();
      updateTrackTitleFromPlayer();
    } else if (e.data === S.PAUSED) {
      setPlaying(false, '⏸ Paused');
      stopScrubUpdater();
    } else if (e.data === S.ENDED) {
      stopScrubUpdater();
      onVideoEnded();
    } else if (e.data === S.BUFFERING) {
      setStatus('Buffering...');
    }
  }

  function onPlayerError(e) {
    console.warn('YT error', e.data, 'index', currentIndex, 'video', videoIds[currentIndex]);

    if (extractingPlaylist) {
      cleanupPlaylistExtraction();
      showError('Could not read that playlist.');
      setLoading(false);
      return;
    }

    if (isPlaylist && videoIds.length > 1) {
      setStatus('Skipping unavailable track...');
      window.setTimeout(function() {
        advanceToNext();
      }, 350);
    } else {
      showError('Cannot play this video — it may be restricted or unavailable.');
      setPlaying(false, 'Playback unavailable.');
    }
  }

  function onVideoEnded() {
    if (isPlaylist) {
      advanceToNext();
      return;
    }
    if (loopOn) {
      try {
        player.seekTo(0, true);
        player.playVideo();
      } catch (err) {}
    } else {
      setPlaying(false, 'Ended.');
    }
  }

  function parseURL(raw) {
    try {
      var u = new URL(raw);
      var host = u.hostname.replace(/^www\./, '');
      var videoId = null;
      var listId = u.searchParams.get('list');

      if (host === 'youtu.be') {
        videoId = u.pathname.replace(/^\//, '').split('/')[0];
      } else if (host === 'youtube.com' || host === 'm.youtube.com' || host === 'music.youtube.com') {
        if (u.pathname === '/watch') {
          videoId = u.searchParams.get('v');
        } else if (u.pathname.indexOf('/shorts/') === 0) {
          videoId = u.pathname.split('/shorts/')[1].split('/')[0];
        } else if (u.pathname === '/playlist') {
          videoId = null;
        } else if (u.pathname.indexOf('/embed/') === 0) {
          videoId = u.pathname.split('/embed/')[1].split('/')[0];
        }
      }

      return { videoId: videoId, listId: listId };
    } catch (err) {
      return null;
    }
  }

  function clearAsyncWork() {
    stopScrubUpdater();
    clearPlaylistExtractionPoll();
    titleQueue = [];
    activeTitleFetches = 0;
    extractingPlaylist = false;
  }

  function resetUIForLoad() {
    clearError();
    setScrub(0, 0);
    setTitle('—');
    playlistListEl.innerHTML = '';
    playlistListEl.classList.remove('visible');
    document.getElementById('player-card').classList.add('visible');
  }

  function setLoading(isLoading) {
    loadBtnEl.disabled = isLoading;
    loadBtnEl.textContent = isLoading ? 'Loading...' : 'Load';
  }

  function loadURL() {
    if (!playerReady || !player) {
      showError('Player initializing — try again in a second.');
      return;
    }

    var raw = document.getElementById('url-input').value.trim();
    if (!raw) {
      showError('Paste a YouTube URL first.');
      return;
    }

    var parsed = parseURL(raw);
    if (!parsed || (!parsed.videoId && !parsed.listId)) {
      showError("That doesn't look like a valid YouTube URL.");
      return;
    }

    loadToken += 1;
    clearAsyncWork();
    resetUIForLoad();
    setLoading(true);

    videoIds = [];
    currentIndex = 0;
    isPlaylist = false;

    if (parsed.listId) {
      isPlaylist = true;
      document.getElementById('track-type').textContent = 'PLAYLIST';
      setStatus('Reading playlist...');
      extractPlaylistIDs(parsed.listId, parsed.videoId, loadToken);
    } else {
      document.getElementById('track-type').textContent = 'VIDEO';
      videoIds = [parsed.videoId];
      playIndex(0, loadToken);
      setLoading(false);
    }
  }

  function extractPlaylistIDs(listId, startVideoId, token) {
    extractingPlaylist = true;

    try {
      player.cuePlaylist({ listType: 'playlist', list: listId, index: 0 });
    } catch (err) {
      extractingPlaylist = false;
      setLoading(false);
      showError('Could not open that playlist.');
      return;
    }

    var tries = 0;
    PLAYLIST_POLL_ID = window.setInterval(function() {
      tries += 1;

      if (token !== loadToken) {
        cleanupPlaylistExtraction();
        return;
      }

      var ids = null;
      try {
        ids = player.getPlaylist();
      } catch (err) {}

      if (Array.isArray(ids) && ids.length) {
        cleanupPlaylistExtraction();
        videoIds = ids.slice();
        currentIndex = Math.max(0, startVideoId ? ids.indexOf(startVideoId) : 0);
        if (currentIndex === -1) currentIndex = 0;
        renderPlaylistWindow();
        playlistListEl.classList.add('visible');
        setStatus('Loaded ' + ids.length + ' tracks');
        playIndex(currentIndex, token);
        setLoading(false);
      } else if (tries > 60) {
        cleanupPlaylistExtraction();
        setLoading(false);
        showError('Could not load playlist — it may be private, blocked, or too slow to read.');
      }
    }, 250);
  }

  function cleanupPlaylistExtraction() {
    extractingPlaylist = false;
    clearPlaylistExtractionPoll();
    try { player.stopVideo(); } catch (err) {}
  }

  function clearPlaylistExtractionPoll() {
    if (PLAYLIST_POLL_ID) {
      window.clearInterval(PLAYLIST_POLL_ID);
      PLAYLIST_POLL_ID = null;
    }
  }

  function playIndex(idx, token) {
    if (!playerReady || !player) return;
    if (idx < 0 || idx >= videoIds.length) return;
    if (token && token !== loadToken) return;

    currentIndex = idx;
    renderPlaylistWindow();
    updateVisibleTitles();
    setTitle(getCachedTitle(idx) || 'Loading...');
    setStatus(isPlaylist ? 'Track ' + (idx + 1) + ' / ' + videoIds.length : 'Loading...');
    setScrub(0, 0);

    try {
      player.loadVideoById(videoIds[idx]);
    } catch (err) {
      showError('Could not load that track.');
    }

    fetchTitleForIndex(idx, true);
    if (isPlaylist) {
      fetchTitleForIndex(idx - 1, false);
      fetchTitleForIndex(idx + 1, false);
    }
  }

  function advanceToNext() {
    if (!videoIds.length) return;
    if (currentIndex < videoIds.length - 1) {
      playIndex(currentIndex + 1, loadToken);
    } else if (loopOn) {
      playIndex(0, loadToken);
    } else {
      setPlaying(false, 'Playlist ended.');
    }
  }

  function prevTrack() {
    if (!playerReady || !videoIds.length) return;
    if (isPlaylist) {
      playIndex((currentIndex - 1 + videoIds.length) % videoIds.length, loadToken);
    } else {
      try { player.seekTo(0, true); } catch (err) {}
    }
  }

  function nextTrack() {
    if (!playerReady || !videoIds.length) return;
    if (isPlaylist) {
      playIndex((currentIndex + 1) % videoIds.length, loadToken);
    } else {
      try {
        player.seekTo(0, true);
        player.playVideo();
      } catch (err) {}
    }
  }

  function getWindowBounds() {
    if (!isPlaylist) return { start: 0, end: 0 };
    var start = Math.max(0, currentIndex - VISIBLE_RADIUS);
    var end = Math.min(videoIds.length, currentIndex + VISIBLE_RADIUS + 1);
    return { start: start, end: end };
  }

  function renderPlaylistWindow() {
    if (!isPlaylist || !videoIds.length) {
      playlistListEl.innerHTML = '';
      playlistListEl.classList.remove('visible');
      return;
    }

    var bounds = getWindowBounds();
    var frag = document.createDocumentFragment();
    var i;

    playlistListEl.innerHTML = '';

    for (i = bounds.start; i < bounds.end; i++) {
      var div = document.createElement('div');
      div.className = 'pl-item' + (i === currentIndex ? ' active' : '');
      div.dataset.i = String(i);

      var num = document.createElement('div');
      num.className = 'pl-num';
      num.textContent = String(i + 1).padStart(2, '0');

      var title = document.createElement('div');
      title.className = 'pl-title';
      title.id = 'plt-' + i;
      title.textContent = titleCache[videoIds[i]] || ('Track ' + (i + 1));

      div.appendChild(num);
      div.appendChild(title);
      div.onclick = (function(idx) {
        return function() { playIndex(idx, loadToken); };
      })(i);
      frag.appendChild(div);
    }

    playlistListEl.appendChild(frag);
    playlistListEl.classList.add('visible');
    ensureActiveVisible();
  }

  function ensureActiveVisible() {
    var active = playlistListEl.querySelector('.pl-item.active');
    if (!active) return;

    var listRect = playlistListEl.getBoundingClientRect();
    var itemRect = active.getBoundingClientRect();
    if (itemRect.top < listRect.top || itemRect.bottom > listRect.bottom) {
      active.scrollIntoView({ block: 'nearest' });
    }
  }

  function updateVisibleTitles() {
    if (!isPlaylist) return;
    var bounds = getWindowBounds();
    for (var i = bounds.start; i < bounds.end; i++) {
      fetchTitleForIndex(i, i === currentIndex);
    }
  }

  function fetchTitleForIndex(idx, prioritize) {
    if (idx < 0 || idx >= videoIds.length) return;
    var id = videoIds[idx];
    if (!id || titleCache[id] || isQueued(id)) return;

    if (prioritize) titleQueue.unshift({ id: id, idx: idx, token: loadToken });
    else titleQueue.push({ id: id, idx: idx, token: loadToken });

    processTitleQueue();
  }

  function isQueued(id) {
    for (var i = 0; i < titleQueue.length; i++) {
      if (titleQueue[i].id === id) return true;
    }
    return false;
  }

  function processTitleQueue() {
    while (activeTitleFetches < TITLE_FETCH_CONCURRENCY && titleQueue.length) {
      var job = titleQueue.shift();
      if (job.token !== loadToken || titleCache[job.id]) continue;

      activeTitleFetches += 1;
      fetch('https://noembed.com/embed?url=https://www.youtube.com/watch?v=' + encodeURIComponent(job.id))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (job.token !== loadToken) return;
          if (data && data.title) {
            titleCache[job.id] = data.title;
            updateTitleInDOM(job.idx, data.title);
            if (videoIds[currentIndex] === job.id) setTitle(data.title);
          }
        })
        .catch(function() {})
        .finally(function() {
          activeTitleFetches -= 1;
          processTitleQueue();
        });
    }
  }

  function updateTitleInDOM(idx, title) {
    var el = document.getElementById('plt-' + idx);
    if (el) el.textContent = title;
  }

  function getCachedTitle(idx) {
    var id = videoIds[idx];
    return id ? titleCache[id] : '';
  }

  function updateTrackTitleFromPlayer() {
    try {
      var data = player.getVideoData();
      var id = videoIds[currentIndex];
      if (data && data.title) {
        titleCache[id] = data.title;
        setTitle(data.title);
        updateTitleInDOM(currentIndex, data.title);
      }
    } catch (err) {}
  }

  function startScrubUpdater() {
    stopScrubUpdater();
    scrubTimer = window.setInterval(updateScrub, 500);
  }

  function stopScrubUpdater() {
    if (scrubTimer) {
      window.clearInterval(scrubTimer);
      scrubTimer = null;
    }
  }

  function updateScrub() {
    if (isScrubbing || !playerReady || !player) return;
    try {
      var cur = player.getCurrentTime() || 0;
      var dur = player.getDuration() || 0;
      setScrub(cur, dur);
    } catch (err) {}
  }

  function setScrub(cur, dur) {
    var pct = dur > 0 ? (cur / dur) * 100 : 0;
    document.getElementById('scrub-fill').style.width = pct + '%';
    document.getElementById('scrub-thumb').style.left = pct + '%';
    document.getElementById('time-current').textContent = fmtTime(cur);
    document.getElementById('time-duration').textContent = fmtTime(dur);
  }

  function fmtTime(s) {
    s = Math.max(0, Math.floor(s || 0));
    var m = Math.floor(s / 60);
    var sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  scrubTrack.addEventListener('mousedown', startScrub);
  scrubTrack.addEventListener('touchstart', startScrub, { passive: true });

  function startScrub(e) {
    isScrubbing = true;
    doScrub(e);
    document.addEventListener('mousemove', doScrub);
    document.addEventListener('touchmove', doScrub, { passive: true });
    document.addEventListener('mouseup', endScrub);
    document.addEventListener('touchend', endScrub);
  }

  function doScrub(e) {
    var rect = scrubTrack.getBoundingClientRect();
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    document.getElementById('scrub-fill').style.width = (pct * 100) + '%';
    document.getElementById('scrub-thumb').style.left = (pct * 100) + '%';
    try {
      document.getElementById('time-current').textContent = fmtTime(pct * (player.getDuration() || 0));
    } catch (err) {}
  }

  function endScrub(e) {
    isScrubbing = false;
    document.removeEventListener('mousemove', doScrub);
    document.removeEventListener('touchmove', doScrub);
    document.removeEventListener('mouseup', endScrub);
    document.removeEventListener('touchend', endScrub);
    try {
      var rect = scrubTrack.getBoundingClientRect();
      var clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
      var pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      player.seekTo(pct * (player.getDuration() || 0), true);
    } catch (err) {}
  }

  function togglePlay() {
    if (!playerReady || !player) return;
    try {
      if (player.getPlayerState() === YT.PlayerState.PLAYING) player.pauseVideo();
      else player.playVideo();
    } catch (err) {}
  }

  function toggleLoop() {
    loopOn = !loopOn;
    document.getElementById('loop-badge').classList.toggle('on', loopOn);
    setStatus('Loop ' + (loopOn ? 'ON' : 'OFF'));
  }

  function setVolume(v) {
    if (!playerReady || !player) return;
    try { player.setVolume(parseInt(v, 10)); } catch (err) {}
  }

  function setPlaying(val, customStatus) {
    document.getElementById('play-btn').innerHTML = val ? '&#9646;&#9646;' : '&#9654;';
    document.getElementById('visualizer').classList.toggle('playing', val);
    if (customStatus) {
      setStatus(customStatus);
    } else if (val) {
      setStatus(isPlaylist ? 'Track ' + (currentIndex + 1) + ' / ' + videoIds.length : '▶ Playing');
    } else {
      setStatus('⏸ Paused');
    }
  }

  function setTitle(text) {
    document.getElementById('track-title').textContent = text || '—';
  }

  function setStatus(text) {
    document.getElementById('status-msg').textContent = text || '';
  }

  function showError(text) {
    document.getElementById('error-msg').textContent = text || '';
  }

  function clearError() {
    document.getElementById('error-msg').textContent = '';
  }

  document.getElementById('url-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadURL();
  });
</script>
</body>
</html>
